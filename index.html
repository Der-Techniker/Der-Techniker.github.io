<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine 3D-Projekte</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 0.2em;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.2em;
            max-width: 600px;
            opacity: 0.9;
        }
        .cta {
            background: #00b4d8;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
        }
        .cta:hover {
            background: #0077b6;
        }
    </style>
</head>
<body>
    <h1>Meine 3D-Welt</h1>
    <p>Hier zeige ich meine neuesten 3D-Modelle und Projekte. Alles interaktiv und modern.</p>
    <a href="#modelle" class="cta">Zu den Modellen</a>
</body>
</html>
