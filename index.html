<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine 3D-Projekte</title>
    <link rel="stylesheet" href="style.css">

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

<nav class="navbar">
    <div class="logo">Markus Dippel</div>
</nav>

<section class="hero">
    <h1>Meine Projekte</h1>
    <p>3D Modelle & Hardware Projekte</p>
</section>

<section class="projects">

    <!-- Projekt 1 -->
    <div class="card">
        <div class="image-container" onclick="openGallery(0)">
            <img src="BILD1" class="img1">
            <img src="BILD2" class="img2">
        </div>
        <h3>Netzteil</h3>
        <p>USB-C Netzteil mit NFC</p>
    </div>

    <!-- Projekt 2 -->
    <div class="card">
        <div class="image-container" onclick="openGallery(1)">
            <img src="BILD3" class="img1">
            <img src="BILD4" class="img2">
        </div>
        <h3>Projekt 2</h3>
        <p>Beschreibung</p>
    </div>

</section>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
    <div class="lightbox-content">
        <img id="lightbox-img">
    </div>

    <button class="close" onclick="closeGallery()">✖</button>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
